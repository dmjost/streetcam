name: Refresh NC cameras

# Rebuilds nc-cams.js from the DriveNC API on a schedule and commits any change.
# Requires a repo secret named NC_DRIVENC_KEY (your DriveNC developer key).
# GitHub Pages redeploys automatically on the commit.

on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC on the 1st of each month
  workflow_dispatch: {}    # lets you run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild nc-cams.js
        env:
          NC_DRIVENC_KEY: ${{ secrets.NC_DRIVENC_KEY }}
        run: node build-nc.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain nc-cams.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add nc-cams.js
            git commit -m "Auto-refresh NC cameras"
            git push
          else
            echo "nc-cams.js unchanged, nothing to commit."
          fi
